name: Build NechiOS

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y nasm grub-pc-bin xorriso build-essential

      - name: Install cross compiler
        run: |
          sudo apt install -y gcc-multilib

      - name: Build OS
        run: make

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: NechiOS-ISO
          path: os.iso